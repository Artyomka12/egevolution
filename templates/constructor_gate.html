<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в конструктор</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 350px;
        }
        h1 { margin: 0 0 10px 0; color: #333; }
        p { color: #666; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus { border-color: #a855f7; outline: none; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); }
        .error-msg {
            color: #dc3545;
            margin-top: 15px;
            font-size: 14px;
            display: none; /* Скрыто по умолчанию */
        }
        .nav-back {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #666;
        }
    </style>
</head>
<body>
    <a href="/" class="nav-back">← На главную</a>

    <div class="card">
        <h1>🔐 Доступ ограничен</h1>
        <p>Введите пароль администратора</p>
        
        <input type="password" id="password-input" placeholder="Пароль" autofocus>
        <button onclick="checkPassword()">Перейти к редактору</button>
        
        <div class="error-msg" id="error-msg">Пароль введён неправильно</div>
    </div>

    <script>
        // Установи здесь нужный пароль
        const CORRECT_PASSWORD = "Artyom12"; 

        const input = document.getElementById('password-input');
        const errorMsg = document.getElementById('error-msg');

        function checkPassword() {
            if (input.value === CORRECT_PASSWORD) {
                window.location.href = "/constructor_editor";
            } else {
                showError();
            }
        }

        // Вход по нажатию Enter
        input.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        function showError() {
            errorMsg.style.display = 'block';
            input.value = ''; // Очистить поле
            input.focus();
            
            // Скрыть ошибку через 2 секунды
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
