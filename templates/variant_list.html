<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор варианта | ЕГЭволюция</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0f172a 0%, #020617 90%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Эффект фоновой сети */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(56, 189, 248, 0.2) 1px, transparent 1px),
                radial-gradient(rgba(56, 189, 248, 0.1) 1px, transparent 1px);
            background-size: 50px 50px, 30px 30px;
            background-position: 0 0, 15px 15px;
            z-index: -1;
            opacity: 0.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Навигация */
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #38bdf8;
            text-decoration: none;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            margin-bottom: 30px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            font-size: 0.9em;
            font-weight: 500;
        }

        .nav-back:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            transform: translateX(-5px);
        }

        /* Заголовок с логотипом */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .main-logo {
            width: 70px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.6));
            animation: floatArrow 3s ease-in-out infinite;
        }

        @keyframes floatArrow {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .page-title {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -1px;
        }

        .page-subtitle {
            color: #94a3b8;
            font-size: 1.2em;
        }

        /* Сетка вариантов */
        .variants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        /* Карточка варианта */
        .variant-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 35px 25px;
            text-decoration: none;
            color: white;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .variant-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .variant-card:hover {
            transform: translateY(-8px);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(56, 189, 248, 0.1);
        }

        .variant-card:hover::before {
            opacity: 1;
        }

        .variant-card .icon {
            font-size: 3.5em;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.4));
        }

        .variant-card h2 {
            font-size: 1.5em;
            margin: 10px 0;
            color: #fff;
            font-weight: 700;
        }

        .variant-card p {
            color: #94a3b8;
            font-size: 0.95em;
        }

        .variant-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin-top: 15px;
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        @media (max-width: 600px) {
            .page-title {
                font-size: 2em;
            }

            .variants-grid {
                grid-template-columns: 1fr;
            }

            .main-logo {
                width: 50px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="nav-back">← На главную</a>
        <div class="page-header">
            <!-- Логотип + Заголовок -->
            <div class="logo-container">
                <img src="{{ url_for('static', filename='favicon.png') }}" alt="Логотип" class="main-logo">
                <h1 class="page-title">Выбор варианта</h1>
            </div>
            <p class="page-subtitle">Выберите тренировочный вариант для решения</p>
        </div>

        <div class="variants-grid">
            {% for variant in variants %}
            <a href="/choose-mode/{{ variant.num }}" class="variant-card">
                <span class="icon">📋</span>
                <h2>Вариант {{ variant.num }}</h2>
                <p>{{ variant.title or 'Пробный вариант ЕГЭ' }}</p>
                <span class="variant-badge">{{ variant.task_count }} заданий</span>
            </a>
            {% endfor %}
        </div>
    </div>
</body>

</html>
